name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Tags + history are required: build.zig bakes the version from
          # `git describe --tags`, and a shallow clone would report "0.0.0".
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      # Stable tags (no pre-release suffix) must ship with every box in
      # RELEASE-CHECKLIST.md checked — the manual Windows-only verification
      # the e2e harness can't reach (interactive pickers, real PATH/registry
      # mutation). Pre-release tags (v*-pre, v*-rc1, …) are exempt: they're
      # the build the checklist itself gets run against.
      - name: Verify release checklist is complete
        shell: bash
        run: |
          tag="$GITHUB_REF_NAME"
          if [[ "$tag" == *-* ]]; then
            echo "Pre-release tag ($tag) — skipping checklist gate."
          elif [ -f RELEASE-CHECKLIST.md ]; then
            unchecked=$(grep -c '^- \[ \]' RELEASE-CHECKLIST.md || true)
            if [ "$unchecked" -gt 0 ]; then
              echo "::error::RELEASE-CHECKLIST.md has $unchecked unchecked item(s) — complete them (or delete/reset the file, per its own last step) before tagging a stable release."
              grep -n '^- \[ \]' RELEASE-CHECKLIST.md
              exit 1
            fi
            echo "Release checklist fully checked."
          else
            echo "No RELEASE-CHECKLIST.md present — nothing to verify."
          fi

      - name: Test
        run: zig build test

      - name: End-to-end
        run: zig build e2e

      # Portable build: -Dcpu=baseline avoids baking the runner's CPU extensions
      # into the binary (a native build crashes with an illegal instruction on
      # machines lacking them). Mirrors the :build action in .nix/actions.toml.
      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dtarget=x86_64-windows -Dcpu=baseline

      - name: Verify baked version matches the tag
        shell: bash
        run: |
          baked=$(./zig-out/bin/nix.exe --version | head -1 | awk '{print $2}')
          echo "baked=$baked tag=$GITHUB_REF_NAME"
          if [ "$baked" != "$GITHUB_REF_NAME" ]; then
            echo "::error::baked version '$baked' does not match tag '$GITHUB_REF_NAME'"
            exit 1
          fi

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path zig-out/bin/nix.exe `
            -DestinationPath "nix-${{ github.ref_name }}-windows-amd64.zip" -Force

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          # Publish immediately (hands-off); auto-generated notes from commits.
          draft: false
          generate_release_notes: true
          files: nix-${{ github.ref_name }}-windows-amd64.zip
