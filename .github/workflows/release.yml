name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Tags + history are required: build.zig bakes the version from
          # `git describe --tags`, and a shallow clone would report "0.0.0".
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Test
        run: zig build test

      # Portable build: -Dcpu=baseline avoids baking the runner's CPU extensions
      # into the binary (a native build crashes with an illegal instruction on
      # machines lacking them). Mirrors nix-build.cmd, minus the --sync deploy.
      - name: Build
        run: zig build -Doptimize=ReleaseFast -Dtarget=x86_64-windows -Dcpu=baseline

      - name: Verify baked version matches the tag
        shell: bash
        run: |
          baked=$(./zig-out/bin/nix.exe --version | head -1 | awk '{print $2}')
          echo "baked=$baked tag=$GITHUB_REF_NAME"
          if [ "$baked" != "$GITHUB_REF_NAME" ]; then
            echo "::error::baked version '$baked' does not match tag '$GITHUB_REF_NAME'"
            exit 1
          fi

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive -Path zig-out/bin/nix.exe `
            -DestinationPath "nix-${{ github.ref_name }}-windows-amd64.zip" -Force

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          # Publish immediately (hands-off); auto-generated notes from commits.
          draft: false
          generate_release_notes: true
          files: nix-${{ github.ref_name }}-windows-amd64.zip
