name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so build.zig's `git describe` bakes a real
          # version rather than falling back to "0.0.0".
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Format check
        run: zig fmt --check src build.zig build.zig.zon

      - name: Test
        run: zig build test

      # Drive the real exe through add/resolve/remove/groups/actions/segments/
      # export→import against a scratch NIX_HOME — the dispatch/IO seam the
      # unit tests can't reach.
      - name: End-to-end
        run: zig build e2e

      # Make sure the portable release build (baseline CPU, Windows target) still
      # compiles — the artifact shipped to users.
      - name: Build (release, portable)
        run: zig build -Doptimize=ReleaseFast -Dtarget=x86_64-windows -Dcpu=baseline

      # POSIX paths (bash snippet, xdg-open, find fallbacks) are Windows-first
      # and never exercised — but they should at least keep COMPILING. A cheap
      # cross-compile catches bit-rot without committing to POSIX support.
      - name: Build (linux, compile check)
        run: zig build -Dtarget=x86_64-linux
